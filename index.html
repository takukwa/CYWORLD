<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mini Homepage</title>

  <style>
    body {
      margin: 0;
      background: #cbd6e2;
      font-family: Arial;
      display: flex;
      justify-content: center; /* 가로 중앙 */
      align-items: center; /* 세로 중앙 */
      height: 100vh; /* 화면 전체 높이 */
    }

    .wrapper {
      width: 900px;
      display: flex;
      background: #f5f5f5;
      border-radius: 20px;
      padding: 20px;
    }

    .left {
      width: 250px;
      background: #e9eef5;
      padding: 15px;
      border-radius: 15px;
    }

    .right {
      flex: 1;
      margin-left: 20px;
      background: white;
      border-radius: 15px;
      padding: 20px;
      min-height: 400px;
      position: relative; /* ⭐ 여기 추가 (핵심) */
    }

    /* 책갈피 메뉴 */
    .tabs {
      position: absolute;
      right: 0; /* 이제 .right 기준으로 붙음 */
      top: 60px;
      transform: translateX(100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tabs button {
      width: 90px;
      padding: 12px;
      border: none;
      background: #4a90e2;
      color: white;
      border-radius: 0 12px 12px 0;
      cursor: pointer;
      box-shadow: -2px 2px 6px rgba(0,0,0,0.2);
    }

    .tabs button:hover {
      background: #357bd8;
    }
  </style>
</head>

<body>

<div class="wrapper">
  
  <div class="left">
    <h3>시현</h3>
    <p>상태메시지</p>
  </div>

  <div class="right" id="content">
    홈 화면

    <!-- ⭐ tabs를 여기 안으로 이동 -->
    <div class="tabs">
      <button onclick="show('home')">홈</button>
      <button onclick="show('profile')">프로필</button>
      <button onclick="show('guest')">방명록</button>
    </div>

  </div>

</div>

<script>
function show(page) {
  if(page === 'home') {
    document.getElementById("content").innerHTML = "<h2>홈</h2><p>여기는 홈 화면</p>" + document.querySelector('.tabs').outerHTML;
  }
  if(page === 'profile') {
    document.getElementById("content").innerHTML = "<h2>프로필</h2><p>여기에 자기소개</p>" + document.querySelector('.tabs').outerHTML;
  }
  if(page === 'guest') {
    document.getElementById("content").innerHTML = "<h2>방명록</h2><p>방명록 기능 들어갈 예정</p>" + document.querySelector('.tabs').outerHTML;
  }
}
</script>

</body>
</html>
