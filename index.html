<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mini Homepage</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to bottom, #c8f2dc, #cfe4ff),
            linear-gradient(rgba(255,255,255,0.7) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.7) 1px, transparent 1px);
      background-size: 100% 100%, 25px 25px, 25px 25px;
    }

    .wrapper {
      width: 900px;
      display: flex;
      background: #e8f8ec; /* 연두색 메인 박스 */
      border-radius: 20px;
      padding: 35px; 
    }

    .left {
      width: 250px;
      background: #ffffff; /* 왼쪽 박스도 흰색 */
      padding: 15px;
      border-radius: 15px;
    }

    .right {
      flex: 1;
      margin-left: 20px;
      background: white;
      border-radius: 15px;
      padding: 20px;
      min-height: 400px;
      position: relative; /* ⭐ 여기 추가 (핵심) */
    }

    /* 책갈피 메뉴 */
    .tabs {
      position: absolute;
      right: 0; /* 이제 .right 기준으로 붙음 */
      top: 60px;
      transform: translateX(100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tabs button {
      width: 90px;
      padding: 12px;
      border: none;
      background: #a8e6cf; /* 연두색 버튼 */
      color: white;
      border-radius: 0 12px 12px 0;
      cursor: pointer;
      /* 그림자 제거 */
    }

    .tabs button:hover {
      background: #7fd9b6; /* 호버 시 조금 진한 연두 */
    }
  </style>
</head>

<body>

<div class="wrapper">
  
  <div class="left">
    <h3>시현</h3>
    <p>상태메시지</p>
  </div>

  <div class="right" id="content">
    홈 화면

    <!-- ⭐ tabs를 여기 안으로 이동 -->
    <div class="tabs">
      <button onclick="show('home')">홈</button>
      <button onclick="show('profile')">프로필</button>
      <button onclick="show('guest')">방명록</button>
    </div>

  </div>

</div>

<script>
function show(page) {
  if(page === 'home') {
    document.getElementById("content").innerHTML = "<h2>홈</h2><p>여기는 홈 화면</p>" + document.querySelector('.tabs').outerHTML;
  }
  if(page === 'profile') {
    document.getElementById("content").innerHTML = "<h2>프로필</h2><p>여기에 자기소개</p>" + document.querySelector('.tabs').outerHTML;
  }
  if(page === 'guest') {
    document.getElementById("content").innerHTML = "<h2>방명록</h2><p>방명록 기능 들어갈 예정</p>" + document.querySelector('.tabs').outerHTML;
  }
}
</script>

</body>
</html>
